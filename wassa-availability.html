<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空室確認 | WASSA WASSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ocean:#1a6b7a;
      --ocean2:#155d6a;
      --ocean-lt:#e8f4f6;
      --sand:#f0ebe3;
      --sand2:#faf8f5;
      --amber:#c08a2a;
      --amber-lt:#fdf4e0;
      --rose:#b85050;
      --rose-lt:#fdf0f0;
      --green:#3a8060;
      --green-lt:#edf7f2;
      --text:#2c2c2c;
      --text2:#666;
      --text3:#999;
      --border:#e8e3dc;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:'Noto Sans JP',sans-serif;
      background:var(--sand2);
      color:var(--text);
      line-height:1.7;
      -webkit-font-smoothing:antialiased;
      min-height:100vh;
    }

    header{
      background:#fff;
      border-bottom:1px solid var(--border);
      padding:24px 24px 18px;
      text-align:center;
      box-shadow:0 1px 12px rgba(0,0,0,0.04);
    }
    .hdr-logo{height:40px;object-fit:contain;display:block;margin:0 auto 10px}
    .hdr-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:0.22em;color:var(--ocean2)}
    .hdr-sub{font-size:10px;color:var(--text3);letter-spacing:0.14em;margin-top:3px;text-transform:uppercase}

    .hero{
      background:linear-gradient(160deg, var(--ocean2) 0%, #2a8a9a 100%);
      color:#fff;text-align:center;padding:44px 20px 38px;position:relative;overflow:hidden;
    }

    .hero-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;letter-spacing:0.1em;margin-bottom:6px;position:relative}
    .hero-sub{font-size:13px;opacity:0.8;letter-spacing:0.04em;position:relative}

    main{max-width:560px;margin:0 auto;padding:36px 16px 80px}

    /* ── Form card ── */
    .form-card{
      background:#fff;border-radius:20px;padding:28px 24px;
      box-shadow:0 2px 18px rgba(26,107,122,0.07);margin-bottom:20px;
    }
    .form-card-title{
      font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;
      color:var(--ocean2);margin-bottom:20px;letter-spacing:0.04em;
    }
    .form-row{display:grid;grid-template-columns:1fr;gap:14px;min-width:0}
    .form-group{margin-bottom:16px;min-width:0;overflow:hidden}
    .form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);letter-spacing:0.04em;margin-bottom:7px}
    .form-input{
      width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;
      font-size:16px;font-family:inherit;color:var(--text);background:#fff;outline:none;
      transition:border-color .2s,box-shadow .2s;
      text-align:left;box-sizing:border-box;min-width:0;
      -webkit-appearance:none;appearance:none;
    }
    .form-input:focus{border-color:var(--ocean);box-shadow:0 0 0 3px rgba(26,107,122,0.1)}
    .check-btn{
      width:100%;padding:15px;background:var(--ocean);color:#fff;border:none;
      border-radius:12px;font-size:14px;font-family:inherit;font-weight:500;
      letter-spacing:0.08em;cursor:pointer;transition:background .2s,transform .15s;margin-top:4px;
    }
    .check-btn:hover{background:var(--ocean2);transform:translateY(-1px)}
    .check-btn:active{transform:none}
    .check-btn:disabled{background:var(--text3);cursor:not-allowed;transform:none}

    /* ── Result ── */
    #result{display:none}
    .result-card{
      background:#fff;border-radius:20px;padding:24px;
      box-shadow:0 2px 18px rgba(26,107,122,0.07);margin-bottom:16px;
    }
    .result-period{
      font-size:13px;color:var(--text3);text-align:center;margin-bottom:20px;
    }
    .result-period strong{color:var(--text);font-weight:500}
    .room-row{
      display:flex;align-items:center;gap:12px;
      padding:18px 0;border-bottom:1px solid var(--border);
    }
    .room-row:last-child{border-bottom:none;padding-bottom:0}
    .room-row:first-child{padding-top:0}
    .room-icon{flex-shrink:0;width:44px;display:flex;align-items:center;justify-content:center}
    .room-icon img{width:38px;height:38px;object-fit:contain}
    .room-info{flex:1}
    .room-name{font-size:15px;font-weight:500;color:var(--text)}
    .room-avail-label{
      display:inline-flex;align-items:center;gap:6px;
      margin-top:4px;font-size:13px;font-weight:500;
    }
    .label-avail{color:var(--green)}
    .label-one  {color:var(--amber)}
    .label-full {color:var(--rose)}
    .avail-mark{font-size:18px;font-weight:700;line-height:1}

    /* ── Divider ── */
    .divider{display:flex;align-items:center;gap:14px;margin:32px 0 24px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider span{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text3);letter-spacing:0.1em;white-space:nowrap}

    /* ── CTA ── */
    .cta-grid{display:flex;justify-content:center}
    .cta-card{max-width:280px;width:100%}
    .cta-card{
      background:#fff;border-radius:18px;padding:24px 18px;text-align:center;
      box-shadow:0 2px 18px rgba(26,107,122,0.07);text-decoration:none;color:inherit;
      display:block;border:2px solid transparent;transition:transform .2s,box-shadow .2s,border-color .2s;
    }
    .cta-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,107,122,0.13)}
    .cta-card.accent{border-color:transparent}
    .cta-icon{height:96px;margin-bottom:14px;display:flex;align-items:flex-end;justify-content:center}
    .cta-icon img{max-height:96px;width:auto;object-fit:contain}
    .cta-label{font-size:10px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px}
    .cta-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--ocean2);margin-bottom:8px}
    .cta-desc{font-size:11px;color:var(--text2);line-height:1.7}
    .cta-btn{display:inline-block;margin-top:14px;padding:9px 20px;border-radius:22px;font-size:12px;font-weight:500;letter-spacing:0.04em;transition:opacity .18s}
    .cta-btn:hover{opacity:.85}
    .btn-fill{background:var(--ocean);color:#fff}
    .btn-out{background:var(--ocean);color:#fff;border:none}

    .notice{
      background:var(--ocean-lt);border-radius:12px;padding:14px 18px;
      font-size:12px;color:var(--ocean2);line-height:1.8;margin-top:16px;
      border-left:3px solid var(--ocean);
    }

    footer{text-align:center;padding:32px 16px 48px;font-size:12px;color:var(--text3);line-height:2.2;border-top:1px solid var(--border)}
    footer a{color:var(--ocean);text-decoration:none}

    .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .error-msg{font-size:13px;color:var(--rose);margin-top:10px;min-height:18px}

    /* Flatpickr WASSA theme */
    .flatpickr-wrapper{width:100%}
    .flatpickr-calendar{font-family:'Noto Sans JP',sans-serif!important;border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 20px rgba(26,107,122,0.12)}
    .flatpickr-months{background:var(--ocean);border-radius:14px 14px 0 0}
    .flatpickr-month{background:transparent!important}
    .flatpickr-prev-month,.flatpickr-next-month{fill:#fff!important;color:#fff!important;padding:10px 14px!important}
    .flatpickr-prev-month svg,.flatpickr-next-month svg{fill:#fff!important}
    .flatpickr-current-month,.flatpickr-current-month .flatpickr-monthDropdown-months,.flatpickr-current-month input.numInput{color:#fff!important;font-weight:500}
    .flatpickr-weekday{color:var(--text2);font-size:11px;font-weight:500}
    .flatpickr-day{border-radius:8px;font-size:14px;color:var(--text)}
    .flatpickr-day.today{border-color:var(--ocean);color:var(--ocean);font-weight:600}
    .flatpickr-day.today:hover{background:var(--ocean-lt)}
    .flatpickr-day.selected,.flatpickr-day.selected:hover{background:var(--ocean);border-color:var(--ocean);color:#fff}
    .flatpickr-day:hover{background:var(--ocean-lt);border-color:transparent}
    .flatpickr-day.disabled,.flatpickr-day.disabled:hover{color:#ccc;text-decoration:line-through;background:transparent}
    input.form-input.flatpickr-input{cursor:pointer}
  </style>
</head>
<body>

<header>
  <img class="hdr-logo" src="logo.png" alt="WASSA WASSA" onerror="this.style.display='none'">
  <div class="hdr-name">WASSA WASSA</div>
  <div class="hdr-sub">Availability Check</div>
</header>

<div class="hero">
  <div class="hero-title">空室確認</div>
  <div class="hero-sub">ご希望の日程の空室状況をお調べします</div>
</div>

<main>
  <div class="form-card">
    <div class="form-card-title">日程を入力してください</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">チェックイン</label>
        <input class="form-input" type="text" id="f-cin" readonly placeholder="日付を選択">
      </div>
      <div class="form-group">
        <label class="form-label">チェックアウト</label>
        <input class="form-input" type="text" id="f-cout" readonly placeholder="日付を選択">
      </div>
    </div>
    <div class="error-msg" id="form-err"></div>
    <button class="check-btn" id="check-btn" onclick="checkAvailability()">空室を確認する</button>
  </div>

  <!-- 結果 -->
  <div id="result">
    <div class="result-card">
      <div class="result-period" id="result-period"></div>
      <div id="result-rooms"></div>
    </div>

    <div class="divider"><span>ご予約はこちら</span></div>

    <div class="cta-grid">
      <a href="https://site.reservation.liberty-service.com/cc5f559e549f4f2fac443b9673014a37/facility-23797ccc-75c0-4a05-a21b-05620de11eba/search" class="cta-card" target="_blank" rel="noopener">
        <div class="cta-icon"><img src="イラスト/icon_new.png" alt=""></div>
        <div class="cta-desc">公式サイトよりご予約いただけます</div>
        <div class="cta-btn btn-fill">公式サイトへ</div>
      </a>
    </div>

    <div class="notice">
      ご不明な点はLINEにてお気軽にどうぞ。<br>
      チェックイン 16:00〜 ／ チェックアウト 〜10:00
    </div>
  </div>
</main>

<footer>
  WASSA WASSA｜沖縄県国頭郡大宜味村根路銘<br>
  TEL: <a href="tel:0980502500">0980-50-2500</a>
  ｜ <a href="https://wassa-okinawa.com/" target="_blank">wassa-okinawa.com</a>
</footer>

<script>
const SB_URL = 'https://mtsdhheqddrckksiqlim.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10c2RoaGVxZGRyY2trc2lxbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc5NDgsImV4cCI6MjA4ODE3Mzk0OH0.c18ExSxNHBOani7CN4QAqaerhvpr5ZCYA0GGkUg0mlc';
const SB_H  = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY };

// 定休日設定をSupabaseから読み込み
(async () => {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/price_common?id=eq.1&select=closed_weekdays,open_exceptions,closed_exceptions`, { headers: SB_H });
    const d = await r.json();
    if (d && d[0]) {
      window._closedWd  = d[0].closed_weekdays    || [3];
      window._openEx    = (d[0].open_exceptions   || []).map(String);
      window._closedEx  = (d[0].closed_exceptions || []).map(String);
    }
  } catch(e) {}
})();

const ROOM_DEFS = [
  {
    key: 'stp', icon: '<img src="イラスト/icon_stp.png" alt="" style="width:38px;height:38px;object-fit:contain">', name: 'スーペリアツイン', total: 2,
    match: rt => rt && (rt.indexOf('01') !== -1 || rt.indexOf('02') !== -1) && rt.indexOf('デラックス') === -1 && rt !== 'DX'
  },
  {
    key: 'dx', icon: '<img src="イラスト/icon_dlx.png" alt="" style="width:38px;height:38px;object-fit:contain">', name: 'デラックス', total: 1,
    match: rt => rt && (rt.indexOf('デラックス') !== -1 || rt === 'DX')
  }
];

// 日付初期値
const today = new Date();
const fmtD  = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const cin0  = new Date(today); cin0.setDate(cin0.getDate() + 2);
const cout0 = new Date(cin0);  cout0.setDate(cout0.getDate() + 1);
const minBook = new Date(today); minBook.setDate(minBook.getDate() + 2);
const maxBook = new Date(today); maxBook.setMonth(maxBook.getMonth() + 13);
let fpCout;
const fpCin = flatpickr('#f-cin', {
  dateFormat: 'Y-m-d', locale: 'ja', disableMobile: true,
  defaultDate: fmtD(cin0), minDate: fmtD(minBook), maxDate: fmtD(maxBook),
  onChange: function(sel, dateStr) {
    if (sel[0]) {
      const nc = new Date(sel[0]); nc.setDate(nc.getDate() + 1);
      fpCout.set('minDate', dateStr);
      if (!fpCout.selectedDates[0] || fpCout.selectedDates[0] <= sel[0])
        fpCout.setDate(fmtD(nc), false);
    }
    document.getElementById('result').style.display = 'none';
  }
});
fpCout = flatpickr('#f-cout', {
  dateFormat: 'Y-m-d', locale: 'ja', disableMobile: true,
  defaultDate: fmtD(cout0), minDate: fmtD(cin0), maxDate: fmtD(maxBook),
  onChange: function() { document.getElementById('result').style.display = 'none'; }
});
updateRepeaterLink();

// 日付フォーマット（表示用）
function dispDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
}

function isClosedDay(ds) {
  const wd = window._closedWd||[3], oe = window._openEx||[], ce = window._closedEx||[];
  if (oe.includes(ds)) return false;
  if (ce.includes(ds)) return true;
  return wd.includes(new Date(ds+'T00:00:00').getDay());
}

async function checkAvailability() {
  const cin  = document.getElementById('f-cin').value;
  const cout = document.getElementById('f-cout').value;
  const errEl = document.getElementById('form-err');
  errEl.textContent = '';

  if (!cin || !cout)     { errEl.textContent = '日程を入力してください。'; return; }
  if (cin >= cout)       { errEl.textContent = 'チェックアウトはチェックインより後の日付を選択してください。'; return; }

  const btn = document.getElementById('check-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>確認中...';

  try {
    const r = await fetch(
      `${SB_URL}/rest/v1/reservations?status=neq.cancelled&check_in=lt.${cout}&check_out=gt.${cin}&select=check_in,check_out,room_type`,
      { headers: SB_H }
    );
    const rsvs = await r.json();

    // 各部屋の最小空き室数を計算（全泊分）
    const nights = [];
    let d = new Date(cin + 'T00:00:00');
    const end = new Date(cout + 'T00:00:00');
    while (d < end) { nights.push(fmtD(d)); d.setDate(d.getDate()+1); }

    if (isClosedDay(cin)) {
      errEl.textContent = 'チェックイン日はメンテナンス日のためご利用いただけません。';
      btn.disabled = false; btn.innerHTML = '空室を確認する';
      document.getElementById('result').style.display = 'none';
      return;
    }
    let roomsHtml = '';
    for (const def of ROOM_DEFS) {
      const minAvail = Math.min(...nights.map(ds => {
        const booked = rsvs.filter(rv => def.match(rv.room_type) && rv.check_in <= ds && rv.check_out > ds).length;
        return def.total - booked;
      }));

      let cls, mark, text;
      if (minAvail <= 0) {
        cls = 'label-full';  mark = '×'; text = '満室';
      } else if (def.total > 1 && minAvail < def.total) {
        cls = 'label-one';   mark = '△'; text = `残り${minAvail}室`;
      } else {
        cls = 'label-avail'; mark = '〇'; text = def.total > 1 ? `${minAvail}室空いています` : '空室あり';
      }

      roomsHtml += `<div class="room-row">
        <div class="room-icon">${def.icon}</div>
        <div class="room-info">
          <div class="room-name">${def.name}</div>
          <div class="room-avail-label ${cls}">
            <span class="avail-mark">${mark}</span>${text}
          </div>
        </div>
      </div>`;
    }

    // 泊数
    const nights_n = nights.length;
    document.getElementById('result-period').innerHTML =
      `<strong>${dispDate(cin)}</strong> チェックイン ／ <strong>${dispDate(cout)}</strong> チェックアウト（${nights_n}泊）`;
    document.getElementById('result-rooms').innerHTML = roomsHtml;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior:'smooth', block:'start' });

  } catch(e) {
    errEl.textContent = 'データの取得に失敗しました。しばらく後にお試しください。';
  } finally {
    btn.disabled = false;
    btn.textContent = '空室を確認する';
  }
}
</script>
</body>
</html>
