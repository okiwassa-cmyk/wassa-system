<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書 | WASSA WASSA</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean:   #1a6b7a;
    --ocean2:  #2a8a9b;
    --sand:    #f7f3ee;
    --sand2:   #ede8e1;
    --text:    #2c2c2c;
    --text2:   #6b6b6b;
    --white:   #ffffff;
    --border:  #d8d0c8;
    --accent:  #c8884a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── ヘッダー ── */
  .site-header {
    background: var(--ocean);
    color: var(--white);
    text-align: center;
    padding: 24px 20px 20px;
  }
  .site-header .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: .25em;
    opacity: .75;
    margin-bottom: 4px;
  }
  .site-header .tagline {
    font-size: 11px;
    opacity: .55;
    letter-spacing: .12em;
  }

  /* ── メインカード ── */
  .container {
    max-width: 640px;
    margin: 32px auto 60px;
    padding: 0 16px;
  }

  .card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,.07);
    overflow: hidden;
  }

  .card-header {
    background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean2) 100%);
    color: var(--white);
    padding: 28px 28px 24px;
  }
  .card-header .doc-label {
    font-size: 11px;
    letter-spacing: .2em;
    opacity: .7;
    margin-bottom: 8px;
  }
  .card-header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: .08em;
    margin-bottom: 12px;
  }
  .card-header .meta-row {
    display: flex;
    gap: 20px;
    font-size: 12px;
    opacity: .8;
    flex-wrap: wrap;
  }

  .card-body { padding: 24px 28px; }

  /* ── ゲスト名 ── */
  .guest-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ocean);
    margin-bottom: 6px;
  }
  .guest-name span { font-size: 13px; color: var(--text2); font-weight: 400; margin-left: 4px; }

  /* ── 宿泊情報 ── */
  .stay-info {
    background: var(--sand);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 16px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stay-item label { font-size: 10px; color: var(--text2); letter-spacing: .08em; display: block; margin-bottom: 2px; }
  .stay-item .val  { font-size: 14px; font-weight: 500; }

  /* ── 明細テーブル ── */
  .section-title {
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--text2);
    margin: 20px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .detail-table thead tr { background: var(--sand); }
  .detail-table th {
    padding: 8px 10px;
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    color: var(--text2);
    letter-spacing: .06em;
  }
  .detail-table th:last-child { text-align: right; }
  .detail-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--sand2);
    vertical-align: top;
  }
  .detail-table td:last-child { text-align: right; white-space: nowrap; }
  .detail-table td.date-cell { color: var(--text2); font-size: 12px; white-space: nowrap; }
  .detail-table tr:last-child td { border-bottom: none; }

  /* ── 合計 ── */
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--ocean);
    color: var(--white);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 16px;
  }
  .total-row .label { font-size: 13px; opacity: .85; }
  .total-row .amount {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: .02em;
  }

  /* ── 有効期限 ── */
  .validity {
    text-align: right;
    font-size: 11px;
    color: var(--text2);
    margin-top: 8px;
  }

  /* ── お問い合わせ ── */
  .contact-box {
    margin-top: 28px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.8;
  }
  .contact-box strong { color: var(--text); font-size: 14px; display: block; margin-bottom: 6px; }
  .contact-box a { color: var(--ocean); text-decoration: none; }

  /* ── 印刷ボタン ── */
  .btn-print {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: var(--sand);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    text-align: center;
    font-family: inherit;
  }
  .btn-print:hover { background: var(--sand2); }

  /* ── ローディング / エラー ── */
  .loading, .error-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    font-size: 14px;
    line-height: 2;
  }
  .error-msg { color: #c0392b; }

  /* ── 期限切れ ── */
  .expired-badge {
    display: inline-block;
    background: #e74c3c;
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }

  @media print {
    .site-header, .btn-print, .contact-box { display: none; }
    body { background: #fff; }
    .card { box-shadow: none; }
    .container { margin: 0; }
  }
  @media (max-width: 480px) {
    .stay-info { grid-template-columns: 1fr; }
    .card-body { padding: 18px 16px; }
    .card-header { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">WASSA WASSA</div>
  <div class="tagline">海と星空の小さな宿　大宜味村</div>
</header>

<div class="container">
  <div class="card" id="main-card">
    <div class="loading" id="loading">見積書を読み込んでいます…</div>
  </div>
</div>

<script>
var SB_URL = 'https://mtsdhheqddrckksiqlim.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10c2RoaGVxZGRyY2trc2lxbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc5NDgsImV4cCI6MjA4ODE3Mzk0OH0.c18ExSxNHBOani7CN4QAqaerhvpr5ZCYA0GGkUg0mlc';

function fmtDate(s) {
  if (!s) return '';
  var m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? m[1]+'年'+parseInt(m[2])+'月'+parseInt(m[3])+'日' : s;
}
function fmtPrice(n) {
  return '¥' + parseInt(n||0).toLocaleString();
}

function getToken() {
  var p = new URLSearchParams(location.search);
  return p.get('token') || '';
}

async function loadQuote() {
  var token = getToken();
  if (!token) { showError('URLが正しくありません。'); return; }

  var res = await fetch(SB_URL + '/rest/v1/quotes?token=eq.' + encodeURIComponent(token) + '&select=*', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) { showError('データを取得できませんでした。'); return; }
  var rows = await res.json();
  if (!rows || rows.length === 0) { showError('見積書が見つかりません。\nURLをご確認ください。'); return; }
  render(rows[0]);
}

function render(q) {
  var card = document.getElementById('main-card');

  // 有効期限チェック
  var isExpired = false;
  if (q.valid_until) {
    var exp = new Date(q.valid_until); exp.setHours(23,59,59);
    isExpired = new Date() > exp;
  }

  // 明細行生成
  var detailRows = '';
  var billing = q.billing;
  if (billing && Array.isArray(billing) && billing.length > 0) {
    var prevDate = '';
    // 日付→カテゴリ順でソート
    billing.forEach(function(row) {
      var d = row.date || '';
      var dateCell = (d !== prevDate) ? '<td class="date-cell">' + fmtDate(d) + '</td>' : '<td class="date-cell"></td>';
      prevDate = d;
      var amt = (parseInt(row.price)||0) * (parseInt(row.qty)||1) - (parseInt(row.discount)||0);
      var itemLabel = (row.item || row.cat || '');
      if (parseInt(row.qty) > 1) itemLabel += ' <span style="color:var(--text2);font-size:11px">×' + row.qty + '名</span>';
      detailRows += '<tr>' + dateCell + '<td>' + itemLabel + '</td><td>' + fmtPrice(amt) + '</td></tr>';
    });
  }

  // 人数テキスト
  var paxParts = [];
  if (parseInt(q.adults))   paxParts.push('大人 ' + q.adults + '名');
  if (parseInt(q.children)) paxParts.push('小学生 ' + q.children + '名');
  if (parseInt(q.infants))  paxParts.push('幼児 ' + q.infants + '名');
  var paxText = paxParts.join('　') || '';

  // 発行日
  var issued = q.created_at ? fmtDate(q.created_at.slice(0,10)) : '';

  card.innerHTML =
    '<div class="card-header">' +
      '<div class="doc-label">お見積書</div>' +
      '<h1>宿泊料金のご案内' + (isExpired ? '<span class="expired-badge">期限切れ</span>' : '') + '</h1>' +
      '<div class="meta-row">' +
        (issued ? '<span>発行日：' + issued + '</span>' : '') +
        (q.valid_until ? '<span>有効期限：' + fmtDate(q.valid_until) + '</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="guest-name">' + (q.guest_name || 'お客様') + '<span>様</span></div>' +

      '<div class="stay-info">' +
        '<div class="stay-item"><label>チェックイン</label><div class="val">' + fmtDate(q.check_in) + '</div></div>' +
        '<div class="stay-item"><label>チェックアウト</label><div class="val">' + fmtDate(q.check_out) + '</div></div>' +
        (q.room_type ? '<div class="stay-item"><label>お部屋</label><div class="val">' + q.room_type + '</div></div>' : '') +
        (paxText ? '<div class="stay-item"><label>人数</label><div class="val">' + paxText + '</div></div>' : '') +
      '</div>' +

      (detailRows ?
        '<div class="section-title">料金明細</div>' +
        '<table class="detail-table">' +
          '<thead><tr><th style="width:90px">日付</th><th>内容</th><th style="text-align:right;width:110px">金額</th></tr></thead>' +
          '<tbody>' + detailRows + '</tbody>' +
        '</table>'
      : '') +

      '<div class="total-row">' +
        '<span class="label">お見積り合計金額（税込）</span>' +
        '<span class="amount">' + fmtPrice(q.total_amount) + '</span>' +
      '</div>' +

      (q.notes ? '<div style="margin-top:14px;font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-wrap">' + q.notes + '</div>' : '') +

      '<div class="contact-box">' +
        '<strong>ご予約・お問い合わせ</strong>' +
        'ご確認いただきご予約をご希望の場合は、このメールに返信するか下記までご連絡ください。<br>' +
        '<a href="mailto:wassa@wassa-okinawa.com">wassa@wassa-okinawa.com</a>　TEL: 0980-50-2500<br>' +
        '<a href="https://wassa-okinawa.com" target="_blank">https://wassa-okinawa.com</a>' +
      '</div>' +

      '<button class="btn-print" onclick="window.print()">🖨️ 印刷・PDFとして保存</button>' +
    '</div>';
}

function showError(msg) {
  document.getElementById('main-card').innerHTML = '<div class="error-msg">' + msg.replace(/\n/g,'<br>') + '<br><br><a href="mailto:wassa@wassa-okinawa.com" style="color:var(--ocean)">wassa@wassa-okinawa.com</a></div>';
}

loadQuote();
</script>
</body>
</html>
